<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Canggu Smart Villas">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07131b"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.16)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="260" cy="240" r="300" fill="rgba(255,255,255,0.10)"/>
  <circle cx="980" cy="120" r="260" fill="rgba(15,23,42,0.22)"/>

  <g filter="url(#shadow)">
    <rect x="150" y="160" width="900" height="520" rx="56" fill="url(#glass)" stroke="rgba(255,255,255,0.20)"/>
    <rect x="260" y="310" width="680" height="300" rx="44" fill="rgba(15,23,42,0.16)"/>
    <rect x="310" y="360" width="220" height="180" rx="28" fill="rgba(255,255,255,0.10)"/>
    <rect x="570" y="360" width="290" height="180" rx="28" fill="rgba(255,255,255,0.10)"/>
    <path d="M260 310 L600 210 L940 310" fill="rgba(255,255,255,0.16)"/>
    <rect x="320" y="565" width="560" height="26" rx="13" fill="rgba(16,185,129,0.22)"/>
  </g>

  <g>
    <circle cx="900" cy="650" r="7" fill="rgba(255,255,255,0.55)"/>
    <circle cx="940" cy="630" r="6" fill="rgba(255,255,255,0.40)"/>
    <circle cx="980" cy="610" r="7" fill="rgba(255,255,255,0.45)"/>
    <path d="M900 650 C940 610, 1010 580, 1060 560" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
  </g>
</svg>
