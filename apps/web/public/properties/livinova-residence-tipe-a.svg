<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Livinova Residence">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1226"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <circle cx="220" cy="140" r="260" fill="rgba(255,255,255,0.10)"/>
  <circle cx="980" cy="260" r="320" fill="rgba(15,23,42,0.22)"/>

  <g filter="url(#shadow)">
    <rect x="160" y="170" width="880" height="500" rx="48" fill="url(#card)" stroke="rgba(255,255,255,0.20)"/>

    <path d="M320 520 L600 350 L880 520 L600 690 Z" fill="rgba(255,255,255,0.18)"/>
    <path d="M320 520 L600 350 L600 610 L320 690 Z" fill="rgba(15,23,42,0.18)"/>
    <path d="M600 350 L880 520 L880 690 L600 610 Z" fill="rgba(14,165,233,0.14)"/>

    <rect x="520" y="540" width="160" height="150" rx="16" fill="rgba(255,255,255,0.12)"/>
    <rect x="555" y="580" width="90" height="110" rx="12" fill="rgba(15,23,42,0.18)"/>
    <rect x="410" y="560" width="70" height="70" rx="12" fill="rgba(255,255,255,0.10)"/>
    <rect x="720" y="560" width="70" height="70" rx="12" fill="rgba(255,255,255,0.10)"/>
  </g>

  <g>
    <circle cx="170" cy="630" r="8" fill="rgba(255,255,255,0.55)"/>
    <circle cx="210" cy="610" r="6" fill="rgba(255,255,255,0.40)"/>
    <circle cx="250" cy="590" r="8" fill="rgba(255,255,255,0.45)"/>
    <path d="M170 630 C240 560, 340 520, 460 520" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
  </g>
