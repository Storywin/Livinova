<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Listing Pengajuan">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1226"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.16)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="170" y="170" width="860" height="500" rx="56" fill="url(#glass)" stroke="rgba(255,255,255,0.22)"/>
    <path d="M340 520 L600 360 L860 520 L600 690 Z" fill="rgba(255,255,255,0.18)"/>
    <rect x="520" y="545" width="160" height="145" rx="16" fill="rgba(255,255,255,0.12)"/>
    <path d="M420 310h360" stroke="rgba(255,255,255,0.25)" stroke-width="8" stroke-linecap="round"/>
    <path d="M420 340h260" stroke="rgba(255,255,255,0.18)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g>
    <circle cx="280" cy="210" r="10" fill="rgba(255,255,255,0.55)"/>
    <circle cx="320" cy="190" r="7" fill="rgba(255,255,255,0.40)"/>
    <circle cx="360" cy="170" r="10" fill="rgba(255,255,255,0.45)"/>
    <path d="M280 210 C340 160, 430 130, 520 126" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
  </g>
</svg>
